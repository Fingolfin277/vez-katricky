<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEZ - Katričky na učení</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
    justify-content: center;
    max-width: 900px;
  }
  .controls select, .controls button {
    background: #334155;
    color: #e2e8f0;
    border: 1px solid #475569;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .controls button:hover { background: #475569; transform: translateY(-1px); }
  .controls button.active { background: #3b82f6; border-color: #3b82f6; }

  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 0.85rem;
    color: #94a3b8;
  }
  .stats span strong { color: #f1f5f9; }

  .progress-bar {
    width: 100%;
    max-width: 800px;
    height: 6px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid #334155;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #a78bfa);
    transition: width 0.3s ease;
    border-radius: 3px;
  }

  .card-container {
    perspective: 1500px;
    width: 100%;
    max-width: 800px;
    min-height: 420px;
    margin-bottom: 20px;
  }
  .card {
    position: relative;
    width: 100%;
    min-height: 420px;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    min-height: 420px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 30px 35px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid #334155;
  }
  .card-front {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  }
  .card-back {
    background: linear-gradient(135deg, #065f46 0%, #064e3b 100%);
    transform: rotateY(180deg);
  }

  .card-category {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(59, 130, 246, 0.2);
    color: #93c5fd;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 15px;
    align-self: flex-start;
  }
  .card-back .card-category {
    background: rgba(16, 185, 129, 0.3);
    color: #6ee7b7;
  }

  .card-question {
    font-size: 1.15rem;
    font-weight: 600;
    color: #f1f5f9;
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .card-options {
    list-style: none;
    padding: 0;
  }
  .card-options li {
    padding: 8px 12px;
    margin-bottom: 6px;
    background: rgba(30, 41, 59, 0.5);
    border-left: 3px solid #475569;
    border-radius: 6px;
    font-size: 0.95rem;
    line-height: 1.4;
  }
  .card-options li.correct {
    background: rgba(16, 185, 129, 0.2);
    border-left-color: #10b981;
    color: #d1fae5;
    font-weight: 500;
  }
  .option-letter {
    font-weight: bold;
    margin-right: 8px;
    color: #93c5fd;
  }
  .correct .option-letter { color: #6ee7b7; }

  .card-answer-label {
    font-size: 0.85rem;
    color: #6ee7b7;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .card-answer-letters {
    font-size: 1.5rem;
    font-weight: bold;
    color: #f0fdf4;
    margin-bottom: 12px;
  }
  .card-explanation {
    font-size: 0.95rem;
    color: #d1fae5;
    line-height: 1.5;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    margin-top: auto;
  }
  .card-flip-hint {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-size: 0.75rem;
    color: #64748b;
    font-style: italic;
  }

  .nav-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .nav-btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 500;
    transition: all 0.2s;
    min-width: 100px;
  }
  .nav-btn:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.flip { background: #8b5cf6; }
  .nav-btn.flip:hover { background: #7c3aed; }
  .nav-btn.known { background: #10b981; }
  .nav-btn.known:hover { background: #059669; }
  .nav-btn.reset { background: #64748b; }

  .card-counter {
    font-size: 1.1rem;
    font-weight: 600;
    color: #f1f5f9;
    min-width: 90px;
    text-align: center;
  }

  .keyboard-hints {
    margin-top: 18px;
    font-size: 0.78rem;
    color: #64748b;
    text-align: center;
  }
  .kbd {
    display: inline-block;
    padding: 2px 8px;
    background: #334155;
    border: 1px solid #475569;
    border-radius: 4px;
    font-family: monospace;
    color: #cbd5e1;
    margin: 0 2px;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    h1 { font-size: 1.4rem; }
    .card-face { padding: 20px; }
    .card-question { font-size: 1rem; }
    .card-options li { font-size: 0.85rem; }
    .nav-btn { padding: 8px 12px; min-width: 70px; font-size: 0.85rem; }
  }
</style>
</head>
<body>
  <h1>VEZ - Katričky na učení</h1>
  <div class="subtitle">Výroba elektronických zařízení - druhý test</div>

  <div class="controls">
    <select id="categoryFilter">
      <option value="all">Všechny kategorie</option>
    </select>
    <button id="shuffleBtn">Zamíchat</button>
    <button id="orderBtn">Původní pořadí</button>
    <button id="knownBtn" class="active">Skrýt naučené</button>
    <button id="resetBtn">Reset naučených</button>
  </div>

  <div class="stats">
    <span>Celkem: <strong id="totalCount">0</strong></span>
    <span>Naučeno: <strong id="knownCount">0</strong></span>
    <span>Zbývá: <strong id="remainingCount">0</strong></span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="card-category" id="frontCategory">Kategorie</span>
        <div class="card-question" id="frontQuestion">Otázka</div>
        <ul class="card-options" id="frontOptions"></ul>
        <div class="card-flip-hint">Klikni nebo stiskni MEZERNÍK pro odpověď</div>
      </div>
      <div class="card-face card-back">
        <span class="card-category" id="backCategory">Kategorie</span>
        <div class="card-answer-label">SPRÁVNÁ ODPOVĚĎ</div>
        <div class="card-answer-letters" id="backLetters"></div>
        <ul class="card-options" id="backOptions"></ul>
        <div class="card-explanation" id="backExplanation"></div>
      </div>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn" id="prevBtn">← Předchozí</button>
    <button class="nav-btn flip" id="flipBtn">Otočit</button>
    <span class="card-counter" id="counter">0 / 0</span>
    <button class="nav-btn known" id="markKnownBtn">Umím ✓</button>
    <button class="nav-btn" id="nextBtn">Další →</button>
  </div>

  <div class="keyboard-hints">
    <span class="kbd">←</span> / <span class="kbd">→</span> navigace &nbsp;•&nbsp;
    <span class="kbd">Space</span> otočit &nbsp;•&nbsp;
    <span class="kbd">K</span> umím &nbsp;•&nbsp;
    <span class="kbd">S</span> shuffle
  </div>

<script>
const flashcards = [
  // === VÝROBA DPS - METODY ===
  { cat: "Metody výroby DPS", q: "Subtraktivní metoda výroby desky plošných spojů:",
    opts: ["Na izolačním podkladu je vytvořen obrazec vodivých spojů postupným nanášením vodivého materiálu.",
           "Na vodivém podkladovém materiálu je vytvořen obrazec izolačních mezer postupným nanášením izolačního materiálu.",
           "Souvislý vodivý materiál je odstraněn z míst, která mají být izolačními mezerami mezi spoji.",
           "Tato metoda neexistuje."],
    ans: [2], exp: "Subtraktivní = odebírání. Z plné mědi se leptáním odstraní místa, kde má být izolace - zůstane jen obrazec spojů." },

  { cat: "Metody výroby DPS", q: "Aditivní metoda výroby desky plošných spojů:",
    opts: ["Na izolačním podkladu je vytvořen obrazec vodivých spojů postupným nanášením vodivého materiálu.",
           "Souvislý vodivý materiál je odstraněn z míst, která mají být izolačními mezerami mezi spoji.",
           "Je kombinací subtraktivní a aditivní technologie.",
           "Tato metoda neexistuje."],
    ans: [0], exp: "Aditivní = přidávání. Na izolační podklad se postupně nanáší vodivý materiál do požadovaného obrazce." },

  { cat: "Metody výroby DPS", q: "Semiaditivní metoda výroby desky plošných spojů:",
    opts: ["Na vodivém podkladovém materiálu je vytvořen obrazec izolačních mezer nanášením izolačního materiálu.",
           "Tato metoda neexistuje.",
           "Je kombinací subtraktivní a aditivní technologie.",
           "Souvislý vodivý materiál je odstraněn z míst, která mají být vodiči."],
    ans: [2], exp: "Semiaditivní metoda = kombinace obou přístupů. Využívá se tenká souvislá vodivá vrstva, na kterou se galvanicky dostavuje materiál, a okolí se odleptá." },

  { cat: "Metody výroby DPS", q: "Dispozitivní metoda výroby desky plošných spojů:",
    opts: ["Na vodivý podkladový materiál je vytvořen obrazec izolačních mezer postupným nanášením.",
           "Na izolačním podkladu je vytvořen obrazec vodivých spojů postupným nanášením vodivého materiálu.",
           "Tato metoda neexistuje.",
           "Souvislý vodivý materiál je odstraněn z míst, která mají být izolačními mezerami mezi spoji."],
    ans: [2], exp: "Chyták - metoda s tímto názvem v oboru výroby DPS neexistuje. Skutečné metody jsou: subtraktivní, aditivní, semiaditivní." },

  // === ÚKOL DPS ===
  { cat: "DPS - obecně", q: "Úkol desky plošných spojů (DPS) je:",
    opts: ["zajištění odvodu ztrátového tepla",
           "zajištění vhodných optických parametrů (zejm. u LED plošáků)",
           "zajistit mechanickou oporu komponentů el. obvodu",
           "zajištění tlumení přebytečného hluku"],
    ans: [0,1,2], exp: "DPS slouží k mechanické opoře součástek, elektrickému propojení, odvodu tepla a u LED aplikací i k optickým funkcím (odrazivost). Tlumení hluku není funkcí DPS." },

  // === KOMPOZITY ===
  { cat: "Kompozity pro DPS", q: "Složky (vlákna) kompozitů pro DPS jsou tvořeny:",
    opts: ["vlákny z plastických hmot (aramid)",
           "křemíkovými vlákny (sikaflex)",
           "skleněnými vlákny z E-skla",
           "uhlíkovými vlákny"],
    ans: [0,2,3], exp: "V kompozitech DPS se používají: aramidová vlákna (Kevlar), skleněná vlákna E-skla (nejběžnější - FR4), a uhlíková vlákna pro speciální aplikace. 'Sikaflex' je tmel, ne vlákno." },

  { cat: "Kompozity pro DPS", q: "Skleněná vlákna z E-skla ve formě tkaniny či rohože tvoří v kompozitu:",
    opts: ["perkolační práh",
           "optickovlákenné spoje",
           "výztuž",
           "matrici"],
    ans: [2], exp: "Skleněná tkanina/rohož slouží jako výztuž (mechanické zpevnění). Matrici tvoří pryskyřice (epoxid), která vlákna drží pohromadě." },

  // === ŠABLONY A PASTA ===
  { cat: "Šablony a pájecí pasta", q: "Šablony pro nanášení pasty se vyrábí:",
    opts: ["Za pomocí laseru",
           "Zamaskováním jednotlivých děr v šabloně",
           "Semiaditivními metodami s pomocí prepregu",
           "Leptáním"],
    ans: [0,3], exp: "Šablony se běžně vyrábí laserovým řezáním (přesné) nebo chemickým leptáním (levnější, méně přesné). U velmi jemných šablon se kombinují." },

  { cat: "Šablony a pájecí pasta", q: "Mezi způsoby nanášení pájecí pasty patří:",
    opts: ["Stěrkou při sítotisku",
           "Epitaxní nanášení",
           "Stěrkou při šablonovém tisku",
           "Tisk pasty tryskáním (Jetting)"],
    ans: [0,2,3], exp: "Pájecí pasta se nanáší sítotiskem, šablonovým tiskem (nejběžnější) nebo jettingem (bezkontaktní). Epitaxe je metoda růstu krystalů polovodičů - ne pro pastu." },

  { cat: "Šablony a pájecí pasta", q: "Pájecí pasty s menšími kuličkami pájky:",
    opts: ["Jsou vhodnější pro menší rozměry součástek",
           "Mají stejně velký problém s oxidací jako pasty s většími kuličkami",
           "Jsou vhodnější pro šablony s jemnými otvory",
           "Jsou vhodnější kvůli menší výsledné rezistivitě spoje"],
    ans: [0,2], exp: "Menší kuličky = menší otvory v šabloně = miniaturnější součástky (0402, 0201). MAJÍ však větší problém s oxidací (větší povrch/objem)." },

  { cat: "Šablony a pájecí pasta", q: "Pájecí pasty s menšími kuličkami pájky (varianta 2):",
    opts: ["Mají stejně velký problém s oxidací jako pasty s většími kuličkami",
           "Mají větší problém s oxidací při pájení (oproti pastám s většími kuličkami)",
           "Jsou vhodnější kvůli menší výsledné rezistivitě spoje",
           "Jsou vhodnější pro šablony s jemnými otvory"],
    ans: [1,3], exp: "Menší kuličky mají větší poměr povrchu k objemu → více oxidace. Ale jsou potřeba pro jemné otvory šablon (malé součástky)." },

  // === PÁJENÍ ===
  { cat: "Pájení", q: "Pájení v parách (VPS - Vapor Phase Soldering):",
    opts: ["Je vhodnější pro teplotně citlivé součástky",
           "Omezuje oxidaci při pájení",
           "Se v elektrotechnice nepoužívá",
           "Je vhodné pro pájení součástek s různou tepelnou kapacitou"],
    ans: [0,1,3], exp: "VPS využívá kondenzaci par inertní kapaliny - rovnoměrný ohřev, bezkyslíkaté prostředí (žádná oxidace), přesná teplota (nelze přehřát). Ideální pro citlivé díly i součástky s různou tepelnou kapacitou." },

  { cat: "Pájení", q: "Mezi metody pájení patří:",
    opts: ["pájení přetavením horkým vzduchem",
           "pájení rentgenovým zářením",
           "pájení přetavením v parní lázni",
           "pájení dutou vlnou"],
    ans: [0,2,3], exp: "Standardní metody: horký vzduch (reflow), parní lázeň (VPS), dutá vlna (wave soldering), laser, IR. Rentgenové záření se používá na kontrolu spojů, ne pro pájení." },

  { cat: "Pájení", q: "Mezi metody pájení patří (varianta 3):",
    opts: ["pájení vytlačením v ochranné atmosféře",
           "pájení dutou vlnou",
           "pájení přetavením v parní lázni",
           "pájení rentgenovým zářením"],
    ans: [1,2], exp: "Reálně existující metody: dutá vlna (wave soldering) a přetavení v parní lázni (VPS). 'Vytlačení v ochranné atmosféře' i rentgenové záření nejsou pájecí metody (rentgen = kontrola kvality)." },

  // === DEFEKTY ===
  { cat: "Defekty při pájení", q: "„Popcorning\" je:",
    opts: ["špatně nanesená pasta vytvářející kuličky",
           "neúplné přetavení kuličky BGA",
           "přehřátí součástky během pájení vlnou",
           "delaminace způsobená vznikem vodní páry z absorbované vlhkosti při zahřátí"],
    ans: [3], exp: "Popcorning - pouzdro součástky absorbuje vlhkost, při rychlém ohřevu (reflow) se voda přemění na páru, která roztrhne pouzdro (jako popcorn). Prevence: sušení před pájením, vakuové balení." },

  // === ESD / EPA ===
  { cat: "ESD ochrana", q: "Zkratkou EPA se označuje:",
    opts: ["prostor chráněný před elektrostatickými výboji",
           "uzemňovací svorka na přístroji",
           "elektrostaticky chráněný prostor",
           "Electrostatic Protected Area"],
    ans: [0,2,3], exp: "EPA = Electrostatic Protected Area = elektrostaticky chráněný prostor = prostor chráněný před ESD. Uvnitř EPA jsou všechny vodivé předměty spojeny přes EBP (Earth Bonding Point). EBP je svorka, ne EPA!" },

  { cat: "ESD ochrana", q: "Manipuluje-li pracovník v EPA s komponenty náchylnými na elektrostatické výboje:",
    opts: ["musí být uzemněn (R < 0,2 Ω)",
           "musí být oblečen do oděvu předepsaného pro pobyt v prostoru EPA",
           "nesmí být přes ESD náramek připojen k EBP",
           "musí být elektrostaticky uzemněn"],
    ans: [1,3], exp: "Pracovník musí být ESD uzemněn (přes náramek ~1 MΩ k EBP) a nosit ESD oděv. Pozor - R < 0,2 Ω je příliš nízké (bezpečnostní riziko), náramek má odpor cca 1 MΩ." },

  { cat: "ESD ochrana", q: "Mezi doporučené prvky pro omezení vzniku elektrostatických výbojů patří:",
    opts: ["ionizátor vzduchu",
           "používání specifických předmětů (materiál podlahy, oděvu)",
           "zvýšení relativní vlhkosti vzduchu",
           "zvýšení teploty v místnosti"],
    ans: [0,1,2], exp: "ESD prevence: ionizátory (neutralizují náboj na izolantech), ESD podlaha/oděv (vodivé materiály), vyšší RH% (nad 40-60 % výrazně snižuje triboelektrické nabíjení). Teplota není faktor." },

  { cat: "ESD ochrana", q: "Ionizéry se využívají:",
    opts: ["k neutralizaci náboje na vodivých i nevodivých předmětech",
           "k usnadnění čištění předmětů",
           "k neutralizaci elektrostatického náboje na vodivých uzemněných předmětech",
           "při práci s ESDS"],
    ans: [0,1,3], exp: "Ionizér produkuje kladné i záporné ionty, které neutralizují náboj na všech předmětech (hlavně izolantech - ty nejde uzemnit). Pomáhá i při čištění (přitahuje/odpuzuje prach). Používá se při práci s ESDS." },

  { cat: "ESD ochrana", q: "Při manipulaci s ESDS díly za použití dočasné pracovní plochy musíme:",
    opts: ["být vodivě spojeni s fází elektrické sítě",
           "být vodivě spojeni s vodičem PEN",
           "být vodivě spojeni s dočasnou pracovní plochou i kostrou zařízení",
           "dočasnou pracovní plochu spojit přes 1 MΩ s kostrou zařízení"],
    ans: [2,3], exp: "Dočasná pracovní plocha se uzemňuje přes omezující odpor ~1 MΩ (bezpečnost + vybití náboje). Pracovník je spojen s touto plochou i kostrou. NIKDY s fází nebo PEN." },

  { cat: "ESD ochrana", q: "Mezi rozhodující parametry pro omezení ESD NEPATŘÍ:",
    opts: ["relativní vlhkost vzduchu",

// state
let currentCards = [...flashcards];
let displayCards = [...flashcards];
let currentIdx = 0;
let knownSet = new Set();
let hideKnown = true;

// categories
const cats = [...new Set(flashcards.map(c => c.cat))];
const catSelect = document.getElementById('categoryFilter');
cats.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  catSelect.appendChild(o);
});

// helpers
const letters = ['A','B','C','D'];

function renderDisplayCards() {
  const cat = catSelect.value;
  let filtered = cat === 'all' ? [...currentCards] : currentCards.filter(c => c.cat === cat);
  if (hideKnown) {
    const cardId = (c) => flashcards.indexOf(c);
    filtered = filtered.filter(c => !knownSet.has(cardId(c)));
  }
  displayCards = filtered;
  if (currentIdx >= displayCards.length) currentIdx = Math.max(0, displayCards.length - 1);
  updateCard();
  updateStats();
}

function updateCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  if (displayCards.length === 0) {
    document.getElementById('frontCategory').textContent = 'Hotovo!';
    document.getElementById('frontQuestion').textContent = 'Všechny katričky jsou naučené nebo vyfiltrované.';
    document.getElementById('frontOptions').innerHTML = '';
    document.getElementById('counter').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '100%';
    return;
  }
  const c = displayCards[currentIdx];
  document.getElementById('frontCategory').textContent = c.cat;
  document.getElementById('backCategory').textContent = c.cat;
  document.getElementById('frontQuestion').textContent = c.q;

  const frontOpts = document.getElementById('frontOptions');
  const backOpts = document.getElementById('backOptions');
  frontOpts.innerHTML = '';
  backOpts.innerHTML = '';
  c.opts.forEach((opt, i) => {
    const li1 = document.createElement('li');
    li1.innerHTML = `<span class="option-letter">${letters[i]})</span>${opt}`;
    frontOpts.appendChild(li1);
    const li2 = document.createElement('li');
    if (c.ans.includes(i)) li2.classList.add('correct');
    li2.innerHTML = `<span class="option-letter">${letters[i]})</span>${opt}`;
    backOpts.appendChild(li2);
  });

  document.getElementById('backLetters').textContent = c.ans.map(i => letters[i]).join(', ');
  document.getElementById('backExplanation').textContent = c.exp;
  document.getElementById('counter').textContent = `${currentIdx + 1} / ${displayCards.length}`;
  document.getElementById('progressFill').style.width = `${((currentIdx + 1) / displayCards.length) * 100}%`;

  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx >= displayCards.length - 1;
}

function updateStats() {
  document.getElementById('totalCount').textContent = flashcards.length;
  document.getElementById('knownCount').textContent = knownSet.size;
  document.getElementById('remainingCount').textContent = flashcards.length - knownSet.size;
}

function shuffle() {
  currentCards = [...flashcards].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  renderDisplayCards();
}

function unshuffle() {
  currentCards = [...flashcards];
  currentIdx = 0;
  renderDisplayCards();
}

function markKnown() {
  if (displayCards.length === 0) return;
  const c = displayCards[currentIdx];
  const cardId = flashcards.indexOf(c);
  knownSet.add(cardId);
  localStorage_safe_set('vez_known', JSON.stringify([...knownSet]));
  renderDisplayCards();
}

// Avoid localStorage if unavailable
function localStorage_safe_set(k, v) { try { localStorage.setItem(k,v); } catch(e){} }
function localStorage_safe_get(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }

// Load known from localStorage
const savedKnown = localStorage_safe_get('vez_known');
if (savedKnown) { try { knownSet = new Set(JSON.parse(savedKnown)); } catch(e){} }

// Events
document.getElementById('card').addEventListener('click', () => {
  document.getElementById('card').classList.toggle('flipped');
});
document.getElementById('flipBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('card').classList.toggle('flipped');
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentIdx < displayCards.length - 1) { currentIdx++; updateCard(); }
});
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; updateCard(); }
});
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('orderBtn').addEventListener('click', unshuffle);
document.getElementById('markKnownBtn').addEventListener('click', markKnown);
document.getElementById('knownBtn').addEventListener('click', (e) => {
  hideKnown = !hideKnown;
  e.target.classList.toggle('active', hideKnown);
  e.target.textContent = hideKnown ? 'Skrýt naučené' : 'Zobrazit vše';
  renderDisplayCards();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Opravdu resetovat všechny naučené katričky?')) {
    knownSet.clear();
    localStorage_safe_set('vez_known', '[]');
    renderDisplayCards();
  }
});
catSelect.addEventListener('change', () => { currentIdx = 0; renderDisplayCards(); });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('card').classList.toggle('flipped'); }
  else if (e.code === 'ArrowRight') { if (currentIdx < displayCards.length - 1) { currentIdx++; updateCard(); } }
  else if (e.code === 'ArrowLeft') { if (currentIdx > 0) { currentIdx--; updateCard(); } }
  else if (e.key.toLowerCase() === 'k') { markKnown(); }
  else if (e.key.toLowerCase() === 's') { shuffle(); }
});

// init
renderDisplayCards();
</script>
